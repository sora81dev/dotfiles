# This config is a STUB! This should never be generated. Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

autogenerated = 0

$mainMod = SUPER

$browser = firefox
$terminal = wezterm
$fileManager = dolphin
$menu = wofi --show drun

# For unsupported wayland application
xwayland {
  force_zero_scaling = true
}

exec-once = waybar
exec-once = nm-applet --indicator
exec-once = dnust &

monitor=DP-2,1920x1080@120.00,auto, 1.0
monitor=,preferred,auto,1.25

bind = $mainMod, C, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, L, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, B, exec, $browser
bind = $mainMod, R, exec, $menu
