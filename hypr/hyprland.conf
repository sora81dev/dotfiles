# This config is a STUB! This should never be generated. Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

autogenerated = 0

$mainMod = SUPER

$browser = firefox
$terminal = wezterm
$fileManager = dolphin
$menu = wofi --show drun

# For unsupported wayland application
xwayland {
  force_zero_scaling = true
}

exec-once = waybar
exec-once = nm-applet --indicator
exec-once = dnust &
exec-once = hyprpaper

monitor=DP-2,1920x1080@120.00,auto, 1.0
monitor=,preferred,auto,1.25

bind = $mainMod, C, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, L, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, B, exec, $browser
bind = $mainMod, R, exec, $menu

# Wallpaper

# Screenshot
#   Ref: ArchLinux + Hyprland設定メモ
#        https://zenn.dev/ziaensochan/scraps/5bbe7a5786f8ba
bind = $mainMod SHIFT, S, exec, bash -c 'mkdir -p ~/Pictures/Screenshots;hyprshot -m window -r - | ffmpeg -i - -frames:v 1 -c:v mjpeg -q:v 1 -f image2pipe - | tee ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).jpg | wl-copy -t image/jpeg'
bind = $mainMod ALT, S, exec, bash -c 'mkdir -p ~/Pictures/Screenshots;hyprshot -m active -m window -r - | ffmpeg -i - -frames:v 1 -c:v mjpeg -q:v 1 -f image2pipe - | tee ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).jpg | wl-copy -t image/jpeg'
bind = $mainMod CTRL, S,exec, bash -c 'mkdir -p ~/Pictures/Screenshots;hyprshot -m region -r - | ffmpeg -i - -frames:v 1 -c:v mjpeg -q:v 1 -f image2pipe - | tee ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).jpg | wl-copy -t image/jpeg'
bind = $mainMod, S, exec, bash -c 'mkdir -p ~/Pictures/Screenshots;hyprshot -m active -m output -r - | ffmpeg -i - -frames:v 1 -c:v mjpeg -q:v 1 -f image2pipe - | tee ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).jpg | wl-copy -t image/jpeg'

